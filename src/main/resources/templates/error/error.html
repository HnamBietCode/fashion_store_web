<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Lỗi ' + ${errorCode} + ' - Fashion Store'">Lỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="text-center p-5">
        <div class="display-1 fw-bold text-muted" th:text="${errorCode}">500</div>
        <h2 class="mt-3" th:text="${errorTitle}">Lỗi hệ thống</h2>
        <p class="text-muted mb-4" th:text="${errorMessage}">Đã xảy ra lỗi không mong muốn.</p>
        <a href="/" class="btn btn-primary me-2"><i class="bi bi-house"></i> Trang chủ</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay
            lại</a>
    </div>
</body>

</html>
