<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Sản phẩm - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5 bg-light">
        <div class="container">
            <div class="row g-4">

                <!-- ===== SIDEBAR FILTER ===== -->
                <div class="col-lg-3">
                    <form th:action="@{/products}" method="get" id="filterForm">
                        <!-- Search -->
                        <div class="card mb-3">
                            <div class="card-body">
                                <label class="form-label fw-bold mb-2"><i class="bi bi-search me-1"></i>Tìm kiếm</label>
                                <div class="input-group">
                                    <input type="text" name="search" class="form-control" placeholder="Tên sản phẩm..."
                                        th:value="${search}">
                                    <button class="btn btn-primary" type="submit">
                                        <i class="bi bi-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Categories -->
                        <div class="card mb-3">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3"><i class="bi bi-tags me-1"></i>Danh mục</h6>
                                <div class="d-flex flex-column gap-1">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="category" id="cat_all"
                                            value="" th:checked="${selectedCategory == null}"
                                            onchange="this.form.submit()">
                                        <label class="form-check-label" for="cat_all">Tất cả</label>
                                    </div>
                                    <div class="form-check" th:each="cat : ${categories}">
                                        <input class="form-check-input" type="radio" name="category"
                                            th:id="${'cat_' + cat.id}" th:value="${cat.id}"
                                            th:checked="${selectedCategory == cat.id}" onchange="this.form.submit()">
                                        <label class="form-check-label" th:for="${'cat_' + cat.id}"
                                            th:text="${cat.name}">Category</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Price Range -->
                        <div class="card mb-3">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3"><i class="bi bi-currency-dollar me-1"></i>Khoảng giá</h6>
                                <div class="mb-2">
                                    <label class="form-label small text-muted">Giá tối thiểu</label>
                                    <div class="input-group input-group-sm">
                                        <input type="number" name="minPrice" class="form-control" placeholder="0"
                                            min="0" step="10000" th:value="${minPrice}">
                                        <span class="input-group-text">đ</span>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small text-muted">Giá tối đa</label>
                                    <div class="input-group input-group-sm">
                                        <input type="number" name="maxPrice" class="form-control"
                                            placeholder="Không giới hạn" min="0" step="10000" th:value="${maxPrice}">
                                        <span class="input-group-text">đ</span>
                                    </div>
                                </div>
                                <!-- Quick price shortcuts -->
                                <div class="d-flex flex-wrap gap-1 mb-3">
                                    <button type="button" class="btn btn-sm btn-outline-secondary"
                                        onclick="setPrice(0, 200000)">Dưới 200k</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary"
                                        onclick="setPrice(200000, 500000)">200k-500k</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary"
                                        onclick="setPrice(500000, null)">Trên 500k</button>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 btn-sm">
                                    <i class="bi bi-funnel me-1"></i>Áp dụng
                                </button>
                            </div>
                        </div>

                        <!-- Sort -->
                        <div class="card mb-3">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3"><i class="bi bi-sort-down me-1"></i>Sắp xếp</h6>
                                <select name="sort" class="form-select form-select-sm" onchange="this.form.submit()">
                                    <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
                                    <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá thấp → cao
                                    </option>
                                    <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá cao → thấp
                                    </option>
                                    <option value="name" th:selected="${sort == 'name'}">Tên A-Z</option>
                                </select>
                            </div>
                        </div>

                        <!-- Reset -->
                        <a th:href="@{/products}" class="btn btn-outline-secondary w-100 btn-sm">
                            <i class="bi bi-x-circle me-1"></i>Xóa bộ lọc
                        </a>
                    </form>
                </div>

                <!-- ===== PRODUCTS GRID ===== -->
                <div class="col-lg-9">
                    <!-- Header bar -->
                    <div
                        class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded-3 shadow-sm">
                        <div>
                            <h5 class="mb-0 fw-bold">
                                <span th:if="${search}">Kết quả: "<span th:text="${search}"></span>"</span>
                                <span th:unless="${search}">Sản phẩm</span>
                            </h5>
                            <!-- Active filters badges -->
                            <div class="mt-1 d-flex flex-wrap gap-1">
                                <span th:if="${selectedCategory != null}" class="badge bg-primary">
                                    <i class="bi bi-tag me-1"></i>Danh mục đã chọn
                                </span>
                                <span th:if="${minPrice != null}" class="badge bg-info text-dark"
                                    th:text="'Từ ' + ${#numbers.formatDecimal(minPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                                <span th:if="${maxPrice != null}" class="badge bg-info text-dark"
                                    th:text="'Đến ' + ${#numbers.formatDecimal(maxPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                            </div>
                        </div>
                        <span class="text-muted" th:text="${products.totalElements} + ' sản phẩm'">0</span>
                    </div>

                    <!-- Product Cards Grid -->
                    <div class="row g-3">
                        <div class="col-md-6 col-xl-4" th:each="product : ${products.content}">
                            <div class="card h-100 shadow-sm border-0"
                                style="transition:transform .2s; border-radius:14px!important;"
                                onmouseover="this.style.transform='translateY(-4px)'"
                                onmouseout="this.style.transform='translateY(0)'">
                                <div class="position-relative overflow-hidden" style="border-radius:14px 14px 0 0;">
                                    <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://placehold.co/300x220?text=' + product.name}"
                                        class="card-img-top" th:alt="${product.name}"
                                        style="height:220px;object-fit:cover;">
                                    <span th:if="${product.salePrice != null}"
                                        class="badge bg-danger position-absolute top-0 end-0 m-2 fs-6">
                                        SALE
                                    </span>
                                    <span th:if="${product.featured}"
                                        class="badge bg-warning text-dark position-absolute top-0 start-0 m-2">
                                        ⭐ Nổi bật
                                    </span>
                                </div>
                                <div class="card-body d-flex flex-column">
                                    <p class="text-muted small mb-1" th:text="${product.category.name}">Category</p>
                                    <h6 class="fw-semibold mb-2" th:text="${product.name}">Product Name</h6>
                                    <div class="mt-auto">
                                        <div class="d-flex align-items-center gap-2 mb-3">
                                            <span th:if="${product.salePrice != null}" class="text-danger fw-bold fs-6"
                                                th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                            <small th:if="${product.salePrice != null}"
                                                class="text-muted text-decoration-line-through"
                                                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</small>
                                            <span th:if="${product.salePrice == null}" class="text-primary fw-bold fs-6"
                                                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                        </div>
                                        <a th:href="@{/products/{slug}(slug=${product.slug})}"
                                            class="btn btn-primary w-100">
                                            <i class="bi bi-eye me-1"></i>Xem chi tiết
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div th:if="${products.content.isEmpty()}" class="text-center py-5 bg-white rounded-3 shadow-sm">
                        <i class="bi bi-inbox display-3 text-muted"></i>
                        <p class="text-muted mt-3 fs-5">Không tìm thấy sản phẩm phù hợp</p>
                        <a th:href="@{/products}" class="btn btn-outline-primary mt-2">Xem tất cả sản phẩm</a>
                    </div>

                    <!-- Pagination (giữ filter params) -->
                    <nav th:if="${products.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/products(page=${products.number - 1}, category=${selectedCategory}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                                th:classappend="${i == products.number} ? 'active'">
                                <a class="page-link"
                                    th:href="@{/products(page=${i}, category=${selectedCategory}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/products(page=${products.number + 1}, category=${selectedCategory}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Quick price shortcut buttons
        function setPrice(min, max) {
            document.querySelector('[name=minPrice]').value = min || '';
            document.querySelector('[name=maxPrice]').value = max || '';
            document.getElementById('filterForm').submit();
        }
    </script>
</body>

</html>
