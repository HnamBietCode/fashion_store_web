<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Sản phẩm - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5 bg-light">
        <div class="container">
            <div class="row g-4">

                <!-- ===== SIDEBAR FILTER (Coolmate Style) ===== -->
                <div class="col-lg-3">
                    <form th:action="@{/products}" method="get" id="filterForm">
                        <div class="sticky-top" style="top: 80px; z-index: 10; padding-right: 15px;">
                            <!-- Filter Header -->
                            <div class="d-flex align-items-center justify-content-between mb-4 border-bottom pb-3">
                                <h2 class="mb-0 fw-bold" style="font-size: 16px;">Bộ lọc</h2>
                                <span class="text-muted" style="font-size: 14px;"
                                    th:text="${products.totalElements} + ' kết quả'">0 kết quả</span>
                            </div>

                            <div class="d-flex flex-column gap-0">
                                <!-- Search -->
                                <div class="mb-3">
                                    <div class="input-group">
                                        <input type="text" name="search" class="form-control border-end-0 shadow-none"
                                            placeholder="Tìm kiếm sản phẩm..." th:value="${search}"
                                            style="font-size: 14px; border-radius: 20px 0 0 20px;">
                                        <button class="btn border border-start-0 text-muted shadow-none" type="submit"
                                            style="background-color: transparent; border-radius: 0 20px 20px 0;">
                                            <i class="bi bi-search" style="font-size: 14px;"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Danh mục -->
                                <div class="border-bottom py-3">
                                    <h3 class="mb-0">
                                        <div class="text-dark d-flex justify-content-between align-items-center w-100 p-0"
                                            style="font-size: 15px; font-weight: 500;">
                                            Danh mục
                                        </div>
                                    </h3>
                                    <div class="mt-3">
                                        <div class="d-flex flex-column gap-3">
                                            <label class="d-flex align-items-center m-0" style="cursor: pointer;">
                                                <input type="radio" name="category" value=""
                                                    th:checked="${selectedCategory == null}"
                                                    onchange="this.form.submit()" class="me-3"
                                                    style="width: 18px; height: 18px; accent-color: #000; cursor: pointer;">
                                                <span class="text-dark" style="font-size: 15px;">Tất cả</span>
                                            </label>
                                            <label class="d-flex align-items-center m-0" th:each="cat : ${categories}"
                                                style="cursor: pointer;">
                                                <input type="radio" name="category" th:value="${cat.id}"
                                                    th:checked="${selectedCategory == cat.id}"
                                                    onchange="this.form.submit()" class="me-3"
                                                    style="width: 18px; height: 18px; accent-color: #000; cursor: pointer;">
                                                <span class="text-dark" style="font-size: 15px;"
                                                    th:text="${cat.name}">Category</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <!-- Khoảng giá -->
                                <div class="border-bottom py-3">
                                    <h3 class="mb-0">
                                        <div class="text-dark d-flex justify-content-between align-items-center w-100 p-0"
                                            style="font-size: 15px; font-weight: 500;">
                                            Khoảng giá
                                        </div>
                                    </h3>
                                    <div class="mt-3">
                                        <div class="d-flex flex-column gap-3">
                                            <div class="row g-2">
                                                <div class="col-6">
                                                    <input type="number" name="minPrice"
                                                        class="form-control form-control-sm shadow-none"
                                                        placeholder="Tối thiểu" min="0" step="10000"
                                                        th:value="${minPrice}" style="font-size:14px;">
                                                </div>
                                                <div class="col-6">
                                                    <input type="number" name="maxPrice"
                                                        class="form-control form-control-sm shadow-none"
                                                        placeholder="Tối đa" min="0" step="10000" th:value="${maxPrice}"
                                                        style="font-size:14px;">
                                                </div>
                                            </div>
                                            <div class="d-flex flex-wrap gap-2">
                                                <button type="button"
                                                    class="btn btn-light btn-sm flex-grow-1 text-muted shadow-none"
                                                    onclick="setPrice(0, 200000)" style="font-size: 13px;">Dưới
                                                    200k</button>
                                                <button type="button"
                                                    class="btn btn-light btn-sm flex-grow-1 text-muted shadow-none"
                                                    onclick="setPrice(200000, 500000)" style="font-size: 13px;">200k -
                                                    500k</button>
                                                <button type="button"
                                                    class="btn btn-light btn-sm flex-grow-1 text-muted shadow-none"
                                                    onclick="setPrice(500000, null)" style="font-size: 13px;">Trên
                                                    500k</button>
                                            </div>
                                            <button type="submit"
                                                class="btn btn-dark btn-sm rounded-pill mt-2 w-100 py-2 shadow-none">Áp
                                                dụng</button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Sắp xếp -->
                                <div class="border-bottom py-3">
                                    <h3 class="mb-0">
                                        <div class="text-dark d-flex justify-content-between align-items-center w-100 p-0"
                                            style="font-size: 15px; font-weight: 500;">
                                            Sắp xếp
                                        </div>
                                    </h3>
                                    <div class="mt-3">
                                        <select name="sort" class="form-select border-0 shadow-none cursor-pointer"
                                            onchange="this.form.submit()"
                                            style="font-size: 15px; padding-left: 0; padding-right: 0;">
                                            <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
                                            <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá thấp →
                                                cao</option>
                                            <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá cao →
                                                thấp</option>
                                            <option value="name" th:selected="${sort == 'name'}">Tên A-Z</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mt-4 text-center">
                                    <a th:href="@{/products}" class="text-decoration-none text-muted"
                                        style="font-size: 14px;">
                                        <i class="bi bi-arrow-counterclockwise me-1"></i> Xóa bộ lọc
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>


                <!-- ===== PRODUCTS GRID ===== -->
                <div class="col-lg-9">
                    <!-- Header bar -->
                    <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
                        <div>
                            <h1 class="mb-0 fw-bold fs-4 text-uppercase">
                                <span th:if="${search}">Kết quả: "<span th:text="${search}"></span>"</span>
                                <span th:unless="${search}"
                                    th:text="${selectedCategory != null} ? ${categories.stream().filter(c -> c.id == selectedCategory).findFirst().get().name} : 'Tất cả sản phẩm'">Sản
                                    phẩm</span>
                            </h1>
                        </div>
                        <span class="text-muted small" th:text="${products.totalElements} + ' kết quả'">0</span>
                    </div>

                    <!-- Active filters badges -->
                    <div class="mb-4 d-flex flex-wrap gap-2" th:if="${minPrice != null or maxPrice != null}">
                        <span th:if="${minPrice != null}"
                            class="badge bg-light text-dark border px-3 py-2 fw-normal rounded-pill"
                            th:text="'Giá từ: ' + ${#numbers.formatDecimal(minPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                        <span th:if="${maxPrice != null}"
                            class="badge bg-light text-dark border px-3 py-2 fw-normal rounded-pill"
                            th:text="'Giá đến: ' + ${#numbers.formatDecimal(maxPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    </div>

                    <!-- Product Cards Grid -->
                    <div class="row g-3">
                        <div class="col-6 col-md-4 col-lg-3" th:each="product : ${products.content}">
                            <div class="card h-100 border-0" style="background-color: transparent;">
                                <div class="position-relative overflow-hidden mb-2"
                                    style="border-radius:12px; aspect-ratio: 3/4; background-color: #f1f1f1;">
                                    <a th:href="@{/products/{slug}(slug=${product.slug})}">
                                        <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://placehold.co/300x400?text=' + product.name}"
                                            class="w-100 h-100" th:alt="${product.name}"
                                            style="object-fit:cover; transition: transform 0.3s;"
                                            onmouseover="this.style.transform='scale(1.05)'"
                                            onmouseout="this.style.transform='scale(1)'">
                                    </a>
                                    <span th:if="${product.salePrice != null}"
                                        class="badge bg-danger position-absolute top-0 end-0 m-2 fs-6 px-2 py-1 shadow-sm">
                                        SALE
                                    </span>
                                </div>
                                <div class="card-body p-0 d-flex flex-column pt-3">
                                    <div class="d-flex align-items-baseline gap-2 mb-1">
                                        <span th:if="${product.salePrice != null}" class="fw-bold"
                                            style="color: #000; font-size: 15px;"
                                            th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                        <del th:if="${product.salePrice != null}" class="text-muted small"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</del>
                                        <span th:if="${product.salePrice == null}" class="fw-bold"
                                            style="color: #000; font-size: 15px;"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                    </div>
                                    <a th:href="@{/products/{slug}(slug=${product.slug})}" class="text-decoration-none"
                                        style="color: #000;">
                                        <h2 class="fw-normal mb-2 text-truncate" style="font-size: 14px;"
                                            th:text="${product.name}">Product Name</h2>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div th:if="${products.content.isEmpty()}" class="text-center py-5 bg-white rounded-3 shadow-sm">
                        <i class="bi bi-inbox display-3 text-muted"></i>
                        <p class="text-muted mt-3 fs-5">Không tìm thấy sản phẩm phù hợp</p>
                        <a th:href="@{/products}" class="btn btn-outline-primary mt-2">Xem tất cả sản phẩm</a>
                    </div>

                    <!-- Pagination (giữ filter params) -->
                    <nav th:if="${products.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/products(page=${products.number - 1}, category=${selectedCategory}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                                th:classappend="${i == products.number} ? 'active'">
                                <a class="page-link"
                                    th:href="@{/products(page=${i}, category=${selectedCategory}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/products(page=${products.number + 1}, category=${selectedCategory}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Quick price shortcut buttons
        function setPrice(min, max) {
            document.querySelector('[name=minPrice]').value = min || '';
            document.querySelector('[name=maxPrice]').value = max || '';
            document.getElementById('filterForm').submit();
        }
    </script>
</body>

</html>
