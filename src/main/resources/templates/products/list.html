<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Sản phẩm - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5">
        <div class="container">
            <div class="row">
                <!-- Sidebar Filter -->
                <div class="col-lg-3 mb-4">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <i class="bi bi-funnel"></i> Bộ lọc
                        </div>
                        <div class="card-body">
                            <!-- Search -->
                            <form th:action="@{/products}" method="get" class="mb-4">
                                <div class="input-group">
                                    <input type="text" name="search" class="form-control" placeholder="Tìm kiếm..."
                                        th:value="${search}">
                                    <button class="btn btn-primary" type="submit">
                                        <i class="bi bi-search"></i>
                                    </button>
                                </div>
                            </form>

                            <!-- Categories -->
                            <h6 class="fw-bold mb-3">Danh mục</h6>
                            <ul class="list-unstyled">
                                <li class="mb-2">
                                    <a th:href="@{/products}" class="text-decoration-none"
                                        th:classappend="${selectedCategory == null} ? 'fw-bold text-primary' : 'text-dark'">
                                        Tất cả sản phẩm
                                    </a>
                                </li>
                                <li class="mb-2" th:each="cat : ${categories}">
                                    <a th:href="@{/products(category=${cat.id})}" class="text-decoration-none"
                                        th:classappend="${selectedCategory == cat.id} ? 'fw-bold text-primary' : 'text-dark'"
                                        th:text="${cat.name}">Category</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="col-lg-9">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0">
                            <span th:if="${search}">Kết quả tìm kiếm: "<span th:text="${search}"></span>"</span>
                            <span th:unless="${search}">Tất cả sản phẩm</span>
                        </h4>
                        <span class="text-muted" th:text="${products.totalElements} + ' sản phẩm'">0 sản phẩm</span>
                    </div>

                    <!-- Product Grid -->
                    <div class="row g-4">
                        <div class="col-md-6 col-lg-4" th:each="product : ${products.content}">
                            <div class="card h-100 product-card">
                                <div class="position-relative">
                                    <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/placeholder.jpg'}"
                                        class="card-img-top" alt="Product" style="height: 220px; object-fit: cover;">
                                    <span th:if="${product.salePrice != null}"
                                        class="badge bg-danger position-absolute top-0 end-0 m-2">SALE</span>
                                </div>
                                <div class="card-body">
                                    <p class="text-muted small mb-1" th:text="${product.category.name}">Category</p>
                                    <h6 class="card-title" th:text="${product.name}">Product Name</h6>
                                    <div class="d-flex align-items-center">
                                        <span th:if="${product.salePrice != null}" class="text-danger fw-bold me-2"
                                            th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                        <small th:if="${product.salePrice != null}"
                                            class="text-muted text-decoration-line-through"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</small>
                                        <span th:if="${product.salePrice == null}" class="text-primary fw-bold"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                    </div>
                                </div>
                                <div class="card-footer bg-white border-0 pt-0">
                                    <a th:href="@{/products/{slug}(slug=${product.slug})}"
                                        class="btn btn-outline-primary w-100">
                                        Xem chi tiết
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${products.content.isEmpty()}" class="text-center py-5">
                        <i class="bi bi-inbox display-1 text-muted"></i>
                        <p class="text-muted mt-3">Không tìm thấy sản phẩm nào</p>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${products.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/products(page=${products.number - 1}, category=${selectedCategory}, search=${search})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                                th:classappend="${i == products.number} ? 'active'">
                                <a class="page-link"
                                    th:href="@{/products(page=${i}, category=${selectedCategory}, search=${search})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/products(page=${products.number + 1}, category=${selectedCategory}, search=${search})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
