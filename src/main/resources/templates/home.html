<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Fashion Store - Trang chủ')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <!-- Hero Banner -->
        <section class="hero-section bg-dark text-white py-5">
            <div class="container text-center py-5">
                <h1 class="display-4 fw-bold">Khám Phá Phong Cách Của Bạn</h1>
                <p class="lead">Bộ sưu tập mới nhất - Giảm giá lên đến 50%</p>
                <a th:href="@{/products}" class="btn btn-primary btn-lg mt-3">Mua sắm ngay</a>
            </div>
        </section>

        <!-- Categories -->
        <section class="py-5">
            <div class="container">
                <h2 class="text-center mb-4">Danh Mục Sản Phẩm</h2>
                <div class="row g-4">
                    <div class="col-md-4 col-lg-2" th:each="category : ${categories}">
                        <a th:href="@{/products(category=${category.slug})}" class="text-decoration-none">
                            <div class="card h-100 text-center category-card">
                                <div class="card-body">
                                    <i class="bi bi-tag fs-1 text-primary"></i>
                                    <h5 class="card-title mt-2" th:text="${category.name}">Category</h5>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Featured Products -->
        <section class="py-5 bg-light">
            <div class="container">
                <h2 class="text-center mb-4">Sản Phẩm Nổi Bật</h2>
                <div class="row g-4">
                    <div class="col-md-6 col-lg-3" th:each="product : ${featuredProducts}">
                        <div class="card h-100 product-card">
                            <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/placeholder.jpg'}"
                                class="card-img-top" alt="Product" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                                <p class="card-text text-muted" th:text="${product.category.name}">Category</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <span th:if="${product.salePrice != null}" class="text-danger fw-bold"
                                            th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                        <small th:if="${product.salePrice != null}"
                                            class="text-muted text-decoration-line-through ms-1"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</small>
                                        <span th:if="${product.salePrice == null}" class="text-primary fw-bold"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-0">
                                <a th:href="@{/products/{slug}(slug=${product.slug})}"
                                    class="btn btn-outline-primary w-100">
                                    Xem chi tiết
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
