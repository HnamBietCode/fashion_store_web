<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Mã giảm giá - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width:240px;min-width:240px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>
        <div class="main-content flex-grow-1 p-4 bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">🏷️ Thêm / Sửa mã giảm giá</h4>
                <a th:href="@{/admin/coupons}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Quay lại
                </a>
            </div>

            <form th:action="@{/admin/coupons/save}" method="post" class="row g-4">
                <input type="hidden" name="id" th:value="${coupon?.id}">

                <div class="col-md-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle text-primary me-2"></i>Thông tin mã
                            </h6>
                        </div>
                        <div class="card-body p-4 row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Mã giảm giá <span
                                        class="text-danger">*</span></label>
                                <input type="text" name="code" class="form-control text-uppercase fw-bold"
                                    th:value="${coupon?.code}" required placeholder="VD: SALE20"
                                    style="letter-spacing:2px;">
                                <div class="form-text">Tự động chuyển thành chữ HOA</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Loại giảm <span
                                        class="text-danger">*</span></label>
                                <select name="discountType" class="form-select" required>
                                    <option value="PERCENT" th:selected="${coupon?.discountType?.name() == 'PERCENT'}">
                                        % Phần trăm
                                    </option>
                                    <option value="FIXED" th:selected="${coupon?.discountType?.name() == 'FIXED'}">
                                        đ Số tiền cố định
                                    </option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Mô tả <span class="text-danger">*</span></label>
                                <input type="text" name="description" class="form-control"
                                    th:value="${coupon?.description}" required
                                    placeholder="VD: Giảm 20% cho đơn từ 300k">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Giá trị giảm <span
                                        class="text-danger">*</span></label>
                                <input type="number" name="discountValue" class="form-control"
                                    th:value="${coupon?.discountValue}" required min="0" step="0.01"
                                    placeholder="20 (%) hoặc 50000 (đ)">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Đơn hàng tối thiểu (đ)</label>
                                <input type="number" name="minOrderAmount" class="form-control"
                                    th:value="${coupon?.minOrderAmount}" min="0" step="1000"
                                    placeholder="Để trống = không giới hạn">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Giảm tối đa (đ, cho %)</label>
                                <input type="number" name="maxDiscount" class="form-control"
                                    th:value="${coupon?.maxDiscount}" min="0" step="1000"
                                    placeholder="Để trống = không giới hạn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giới hạn lượt dùng</label>
                                <input type="number" name="usageLimit" class="form-control"
                                    th:value="${coupon?.usageLimit}" min="1" placeholder="Để trống = không giới hạn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Hết hạn lúc</label>
                                <input type="datetime-local" name="expiresAt" class="form-control"
                                    th:value="${coupon?.expiresAt != null ? #temporals.format(coupon.expiresAt, 'yyyy-MM-dd''T''HH:mm') : ''}">
                                <div class="form-text">Để trống = không hết hạn</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-toggle-on text-success me-2"></i>Trạng thái</h6>
                        </div>
                        <div class="card-body p-3">
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" name="active" value="true"
                                    id="activeSwitch" th:checked="${coupon == null or coupon.active}">
                                <label class="form-check-label fw-semibold" for="activeSwitch">Kích hoạt</label>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 p-3">
                            <button type="submit" class="btn btn-primary w-100 mb-2">
                                <i class="bi bi-check-lg me-1"></i>Lưu mã
                            </button>
                            <a th:href="@{/admin/coupons}" class="btn btn-outline-secondary w-100">Hủy</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
