<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Dashboard - Admin')}"></head>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<body>
    <div class="d-flex">
        <div style="width:240px;min-width:240px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4 bg-light" style="min-height:100vh;">

            <!-- Topbar -->
            <div class="topbar">
                <div>
                    <h5 class="mb-0 fw-bold">Dashboard</h5>
                    <small class="text-muted">Tổng quan hệ thống</small>
                </div>
                <div class="text-muted small" th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></div>
            </div>

            <!-- ===== STAT CARDS ===== -->
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-3 p-3" style="background:#eef2ff;">
                                <i class="bi bi-box-seam fs-4 text-primary"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Sản phẩm</div>
                                <div class="fw-bold fs-4" th:text="${totalProducts}">0</div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 pt-0">
                            <a th:href="@{/admin/products}" class="small text-primary">Quản lý →</a>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-3 p-3" style="background:#f0fdf4;">
                                <i class="bi bi-people fs-4 text-success"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Người dùng</div>
                                <div class="fw-bold fs-4" th:text="${totalUsers}">0</div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 pt-0">
                            <a th:href="@{/admin/users}" class="small text-success">Quản lý →</a>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-3 p-3" style="background:#fffbeb;">
                                <i class="bi bi-bag-check fs-4 text-warning"></i>
                            </div>
                            <div>
                                <div class="text-muted small">
                                    Đơn hàng
                                    <span th:if="${pendingOrders > 0}" class="badge bg-warning text-dark ms-1"
                                        th:text="${pendingOrders} + ' chờ'"></span>
                                </div>
                                <div class="fw-bold fs-4" th:text="${totalOrders}">0</div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 pt-0">
                            <a th:href="@{/admin/orders}" class="small text-warning">Quản lý →</a>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-3 p-3" style="background:#fdf4ff;">
                                <i class="bi bi-currency-dollar fs-4" style="color:#9333ea;"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Doanh thu</div>
                                <div class="fw-bold fs-5 text-success"
                                    th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 pt-0">
                            <small class="text-muted">Đơn đã giao</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== REVENUE CHART ===== -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-bar-chart-line me-2 text-primary"></i>Doanh thu 12 tháng
                        gần nhất</h6>
                    <span class="badge bg-success"
                        th:text="'Tổng: ' + ${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + 'đ'">0</span>
                </div>
                <div class="card-body p-4">
                    <canvas id="revenueChart" height="90"></canvas>
                </div>
            </div>

            <!-- ===== RECENT ORDERS ===== -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2 text-muted"></i>Đơn hàng gần đây</h6>
                    <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Tổng tiền</th>
                                <th>Thanh toán</th>
                                <th>Trạng thái</th>
                                <th>Ngày đặt</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(recentOrders)}">
                                <td colspan="7" class="text-center py-4 text-muted">Chưa có đơn hàng nào.</td>
                            </tr>
                            <tr th:each="order : ${recentOrders}">
                                <td><strong th:text="${order.orderNumber}">FS123</strong></td>
                                <td>
                                    <div th:text="${order.shippingName}">Customer</div>
                                    <small class="text-muted" th:text="${order.shippingPhone}">Phone</small>
                                </td>
                                <td class="text-success fw-semibold"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    0đ</td>
                                <td>
                                    <span th:text="${order.paymentMethod == 'COD'} ? 'COD' : 'Chuyển khoản'">COD</span>
                                </td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${order.status.name() == 'PENDING'}   ? 'bg-warning text-dark' :
                                                      (${order.status.name() == 'CONFIRMED'} ? 'bg-info text-white' :
                                                      (${order.status.name() == 'SHIPPING'}  ? 'bg-primary' :
                                                      (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))" th:text="${order.status.name() == 'PENDING'}   ? 'Chờ xác nhận' :
                                               (${order.status.name() == 'CONFIRMED'} ? 'Đã xác nhận'  :
                                               (${order.status.name() == 'SHIPPING'}  ? 'Đang giao'    :
                                               (${order.status.name() == 'DELIVERED'} ? 'Đã giao'      : 'Đã hủy')))">
                                    </span>
                                </td>
                                <td class="text-muted small"
                                    th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                <td>
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                                        class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        // Dữ liệu từ controller (Thymeleaf inline)
        const labels = /*[[${chartLabels}]]*/[];
        const data = /*[[${chartData}]]*/[];

        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Doanh thu (đ)',
                    data: data,
                    backgroundColor: 'rgba(13, 110, 253, 0.15)',
                    borderColor: 'rgba(13, 110, 253, 0.8)',
                    borderWidth: 2,
                    borderRadius: 6,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const val = ctx.raw;
                                return ' ' + new Intl.NumberFormat('vi-VN').format(val) + 'đ';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        ticks: {
                            callback: val => new Intl.NumberFormat('vi-VN', {
                                notation: 'compact', compactDisplay: 'short'
                            }).format(val) + 'đ'
                        }
                    },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>

</html>
