<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Người dùng - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width: 260px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-people me-2"></i>Quản lý Người dùng</h2>
                <span class="badge bg-secondary fs-6" th:text="${#lists.size(users)} + ' người dùng'">0</span>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Điện thoại</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="8" class="text-center py-4 text-muted">Chưa có người dùng nào.</td>
                            </tr>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}">1</td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                                            style="width:36px;height:36px;font-size:14px;font-weight:600;"
                                            th:text="${#strings.substring(u.fullName,0,1).toUpperCase()}">A</div>
                                        <span th:text="${u.fullName}">Tên</span>
                                    </div>
                                </td>
                                <td th:text="${u.email}">email@example.com</td>
                                <td th:text="${u.phone != null ? u.phone : '-'}">-</td>
                                <td>
                                    <span th:if="${u.role.name() == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                                    <span th:unless="${u.role.name() == 'ADMIN'}"
                                        class="badge bg-info text-dark">CUSTOMER</span>
                                </td>
                                <td>
                                    <span th:if="${u.enabled}" class="badge bg-success">Hoạt động</span>
                                    <span th:unless="${u.enabled}" class="badge bg-secondary">Bị khóa</span>
                                </td>
                                <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post"
                                        class="d-inline">
                                        <button type="submit"
                                            th:class="${u.enabled} ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'"
                                            th:text="${u.enabled} ? 'Khóa' : 'Mở khóa'">
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
