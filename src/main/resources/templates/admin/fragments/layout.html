<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Admin Head -->

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Admin - Fashion Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 10px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .main-content {
            background: #f8f9fa;
            min-height: 100vh;
        }
    </style>
</head>

<!-- Admin Sidebar -->
<nav th:fragment="sidebar" class="sidebar d-flex flex-column p-3">
    <a href="/admin" class="text-white text-decoration-none mb-4">
        <h4><i class="bi bi-bag-heart-fill"></i> Admin Panel</h4>
    </a>
    <ul class="nav flex-column flex-grow-1">
        <li class="nav-item">
            <a th:href="@{/admin}" class="nav-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/products}" class="nav-link">
                <i class="bi bi-box"></i> Sản phẩm
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/categories}" class="nav-link">
                <i class="bi bi-tags"></i> Danh mục
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/orders}" class="nav-link">
                <i class="bi bi-bag"></i> Đơn hàng
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/users}" class="nav-link">
                <i class="bi bi-people"></i> Người dùng
            </a>
        </li>
    </ul>
    <hr class="text-white-50">
    <div class="text-white-50 small">
        <span sec:authentication="name">Admin</span>
    </div>
    <a th:href="@{/}" class="nav-link text-white-50 mt-2">
        <i class="bi bi-arrow-left"></i> Về trang chủ
    </a>
</nav>

</html>
