<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Danh mục - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width: 260px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${category.id != null} ? 'Sửa danh mục' : 'Thêm danh mục'">Form</h2>
                <a th:href="@{/admin/categories}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
            </div>

            <div class="card shadow-sm" style="max-width: 600px;">
                <div class="card-body">
                    <form th:action="@{/admin/categories/save}" method="post">
                        <input type="hidden" name="id" th:value="${category.id}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên danh mục <span
                                    class="text-danger">*</span></label>
                            <input type="text" name="name" id="catName" class="form-control" th:value="${category.name}"
                                required oninput="autoSlug(this.value)">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Slug <span class="text-danger">*</span></label>
                            <input type="text" name="slug" id="catSlug" class="form-control" th:value="${category.slug}"
                                required>
                            <div class="form-text">Tự động sinh từ tên. VD: "Áo Nam" → "ao-nam"</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"
                                th:text="${category.description}"></textarea>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input type="checkbox" name="active" class="form-check-input" value="true"
                                    id="activeCheck" th:checked="${category.active == null or category.active}">
                                <label class="form-check-label" for="activeCheck">Hiển thị danh mục</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Lưu danh mục
                            </button>
                            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function autoSlug(name) {
            // Only auto-generate if the page is in "create" mode (slug field is empty or matches previous auto)
            const slugField = document.getElementById('catSlug');
            // Normalize Vietnamese characters
            let slug = name.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/đ/g, 'd').replace(/Đ/g, 'd')
                .replace(/[^a-z0-9\s-]/g, '')
                .trim()
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
            slugField.value = slug;
        }
    </script>
</body>

</html>
