<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Danh mục - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width: 260px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-tags me-2"></i>Quản lý Danh mục</h2>
                <a th:href="@{/admin/categories/create}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Thêm danh mục
                </a>
            </div>

            <div th:if="${message}" class="alert alert-success alert-dismissible fade show" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" th:text="${error}"></div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Tên danh mục</th>
                                <th>Slug</th>
                                <th>Mô tả</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(categories)}">
                                <td colspan="6" class="text-center py-4 text-muted">Chưa có danh mục nào.</td>
                            </tr>
                            <tr th:each="cat : ${categories}">
                                <td th:text="${cat.id}">1</td>
                                <td>
                                    <strong th:text="${cat.name}">Tên</strong>
                                </td>
                                <td><code th:text="${cat.slug}">slug</code></td>
                                <td th:text="${cat.description != null ? cat.description : '-'}">-</td>
                                <td>
                                    <span th:if="${cat.active}" class="badge bg-success">Hiển thị</span>
                                    <span th:unless="${cat.active}" class="badge bg-secondary">Ẩn</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                        class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i> Sửa
                                    </a>
                                    <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post"
                                        class="d-inline"
                                        onsubmit="return confirm('Bạn có chắc muốn xóa danh mục này không?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i> Xóa
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
