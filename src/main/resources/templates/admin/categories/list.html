<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Danh mục - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width:240px;min-width:240px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4 bg-light" style="min-height:100vh;">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0">🏷️ Quản lý Danh mục</h4>
                    <p class="text-muted mb-0 small" th:text="${#lists.size(categories)} + ' danh mục'">0</p>
                </div>
                <a th:href="@{/admin/categories/create}" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Thêm danh mục
                </a>
            </div>

            <!-- Alerts -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Categories Table -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th style="width:60px;">#</th>
                                <th>Tên danh mục</th>
                                <th>Slug</th>
                                <th>Mô tả</th>
                                <th>Trạng thái</th>
                                <th style="width:150px;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(categories)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-tags display-4 d-block mb-2"></i>Chưa có danh mục nào.
                                </td>
                            </tr>
                            <tr th:each="cat, stat : ${categories}">
                                <td class="text-muted small" th:text="${cat.id}">1</td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="rounded-2 d-flex align-items-center justify-content-center text-white"
                                            style="width:36px;height:36px;font-size:16px;"
                                            th:style="${stat.index % 5 == 0} ? 'background:#4f46e5;' :
                                                   (${stat.index % 5 == 1} ? 'background:#16a34a;' :
                                                   (${stat.index % 5 == 2} ? 'background:#ea580c;' :
                                                   (${stat.index % 5 == 3} ? 'background:#9333ea;' : 'background:#e11d48;')))">
                                            <i class="bi bi-tag-fill"></i>
                                        </div>
                                        <strong th:text="${cat.name}">Tên</strong>
                                    </div>
                                </td>
                                <td><code th:text="${cat.slug}">slug</code></td>
                                <td class="text-muted small"
                                    th:text="${cat.description != null ? #strings.abbreviate(cat.description, 50) : '-'}">
                                    -</td>
                                <td>
                                    <span th:if="${cat.active}" class="badge bg-success">● Hiển thị</span>
                                    <span th:unless="${cat.active}" class="badge bg-secondary">○ Ẩn</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                        class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post"
                                        class="d-inline"
                                        onsubmit="return confirm('Xóa danh mục này? Các sản phẩm liên quan sẽ bị ảnh hưởng!')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
