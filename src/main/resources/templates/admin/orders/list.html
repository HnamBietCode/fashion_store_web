<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Đơn hàng - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width:240px;min-width:240px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <div class="topbar">
                <div>
                    <h5 class="mb-0 fw-bold">Quản lý Đơn hàng</h5>
                    <small class="text-muted">Tất cả đơn hàng trong hệ thống</small>
                </div>
                <span class="badge bg-secondary fs-6" th:text="${#lists.size(orders)} + ' đơn'">0</span>
            </div>

            <div th:if="${message}" class="alert alert-success alert-dismissible fade show" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" th:text="${error}"></div>

            <!-- Filter tabs -->
            <div class="card mb-3">
                <div class="card-body py-2">
                    <div class="d-flex gap-2 flex-wrap">
                        <a href="/admin/orders" class="btn btn-sm btn-outline-secondary">Tất cả</a>
                        <a href="/admin/orders?status=PENDING" class="btn btn-sm btn-warning">⏳ Chờ xác nhận</a>
                        <a href="/admin/orders?status=CONFIRMED" class="btn btn-sm btn-info">✅ Đã xác nhận</a>
                        <a href="/admin/orders?status=SHIPPING" class="btn btn-sm btn-primary">🚚 Đang giao</a>
                        <a href="/admin/orders?status=DELIVERED" class="btn btn-sm btn-success">✔ Đã giao</a>
                        <a href="/admin/orders?status=CANCELLED" class="btn btn-sm btn-danger">✖ Đã hủy</a>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Tổng tiền</th>
                                <th>Thanh toán</th>
                                <th>Trạng thái</th>
                                <th>Ngày đặt</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="7" class="text-center py-4 text-muted">Chưa có đơn hàng nào.</td>
                            </tr>
                            <tr th:each="order : ${orders}">
                                <td><strong th:text="${order.orderNumber}">FS123</strong></td>
                                <td>
                                    <div class="fw-semibold" th:text="${order.shippingName}">Customer</div>
                                    <small class="text-muted" th:text="${order.shippingPhone}">Phone</small>
                                </td>
                                <td class="text-success fw-semibold"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    0đ</td>
                                <td>
                                    <span
                                        th:text="${order.paymentMethod.name() == 'COD'} ? 'COD' : 'Chuyển khoản'">COD</span>
                                </td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                         (${order.status.name() == 'CONFIRMED'} ? 'bg-info' :
                                                         (${order.status.name() == 'SHIPPING'} ? 'bg-primary' :
                                                         (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                                        th:text="${order.status.name() == 'PENDING'} ? 'Chờ xác nhận' :
                                                   (${order.status.name() == 'CONFIRMED'} ? 'Đã xác nhận' :
                                                   (${order.status.name() == 'SHIPPING'} ? 'Đang giao' :
                                                   (${order.status.name() == 'DELIVERED'} ? 'Đã giao' : 'Đã hủy')))">
                                    </span>
                                </td>
                                <td class="text-muted small"
                                    th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                <td>
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                                        class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i> Chi tiết
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
