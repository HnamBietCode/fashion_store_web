<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Quản lý đơn hàng - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width: 260px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <h2 class="mb-4">Quản lý đơn hàng</h2>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>SĐT</th>
                                <th>Tổng tiền</th>
                                <th>Thanh toán</th>
                                <th>Trạng thái</th>
                                <th>Ngày đặt</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td><strong th:text="${order.orderNumber}">FS123</strong></td>
                                <td th:text="${order.shippingName}">Customer</td>
                                <td th:text="${order.shippingPhone}">Phone</td>
                                <td class="text-danger fw-bold"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    0đ</td>
                                <td th:text="${order.paymentMethod}">COD</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning' : 
                                                     (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 
                                                     (${order.status.name() == 'SHIPPING'} ? 'bg-primary' : 
                                                     (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                                        th:text="${order.status}">PENDING</span>
                                </td>
                                <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                <td>
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-primary">
                                        Chi tiết
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
