<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Chi tiết đơn hàng - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width: 260px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Đơn hàng #<span th:text="${order.orderNumber}">FS123</span></h2>
                <a th:href="@{/admin/orders}" class="btn btn-secondary">Quay lại</a>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="row">
                <!-- Order Info -->
                <div class="col-lg-8">
                    <div class="card mb-4">
                        <div class="card-header">
                            <strong>Sản phẩm đặt hàng</strong>
                        </div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item" th:each="item : ${order.items}">
                                <div class="row align-items-center">
                                    <div class="col-md-6" th:text="${item.productName}">Product</div>
                                    <div class="col-md-2"
                                        th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ
                                    </div>
                                    <div class="col-md-2">x <span th:text="${item.quantity}">1</span></div>
                                    <div class="col-md-2 fw-bold"
                                        th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                        0đ</div>
                                </div>
                            </li>
                        </ul>
                        <div class="card-footer">
                            <div class="d-flex justify-content-between">
                                <strong>Tổng cộng:</strong>
                                <strong class="text-danger h5"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status & Actions -->
                <div class="col-lg-4">
                    <!-- Update Status -->
                    <div class="card mb-4">
                        <div class="card-header bg-dark text-white">Cập nhật trạng thái</div>
                        <div class="card-body">
                            <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                                <select name="status" class="form-select mb-3">
                                    <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">Chờ xác
                                        nhận</option>
                                    <option value="CONFIRMED" th:selected="${order.status.name() == 'CONFIRMED'}">Đã xác
                                        nhận</option>
                                    <option value="SHIPPING" th:selected="${order.status.name() == 'SHIPPING'}">Đang
                                        giao hàng</option>
                                    <option value="DELIVERED" th:selected="${order.status.name() == 'DELIVERED'}">Đã
                                        giao</option>
                                    <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">Đã hủy
                                    </option>
                                </select>
                                <button type="submit" class="btn btn-primary w-100">Cập nhật</button>
                            </form>
                        </div>
                    </div>

                    <!-- Shipping Info -->
                    <div class="card">
                        <div class="card-header bg-dark text-white">Thông tin giao hàng</div>
                        <div class="card-body">
                            <p><strong>Người nhận:</strong> <span th:text="${order.shippingName}">Name</span></p>
                            <p><strong>SĐT:</strong> <span th:text="${order.shippingPhone}">Phone</span></p>
                            <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}">Address</span></p>
                            <p><strong>Thanh toán:</strong> <span th:text="${order.paymentMethod}">COD</span></p>
                            <p th:if="${order.note}"><strong>Ghi chú:</strong> <span th:text="${order.note}">Note</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
