<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Thêm/Sửa sản phẩm - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width: 260px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <h2 th:text="${product.id != null} ? 'Sửa sản phẩm' : 'Thêm sản phẩm'">Form</h2>

            <div class="card mt-4">
                <div class="card-body">
                    <form th:action="@{/admin/products/save}" method="post">
                        <input type="hidden" name="id" th:value="${product.id}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tên sản phẩm *</label>
                                <input type="text" name="name" class="form-control" th:value="${product.name}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Slug *</label>
                                <input type="text" name="slug" class="form-control" th:value="${product.slug}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"
                                th:text="${product.description}"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Giá gốc *</label>
                                <input type="number" name="price" class="form-control" th:value="${product.price}"
                                    required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Giá sale</label>
                                <input type="number" name="salePrice" class="form-control"
                                    th:value="${product.salePrice}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Số lượng kho *</label>
                                <input type="number" name="stockQuantity" class="form-control"
                                    th:value="${product.stockQuantity}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Danh mục *</label>
                                <select name="categoryId" class="form-select" required>
                                    <option value="">Chọn danh mục</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                        th:selected="${product.category != null && product.category.id == cat.id}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">URL Hình ảnh</label>
                                <input type="text" name="imageUrl" class="form-control" th:value="${product.imageUrl}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check form-check-inline">
                                <input type="checkbox" name="featured" class="form-check-input" value="true"
                                    th:checked="${product.featured}">
                                <label class="form-check-label">Nổi bật</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="checkbox" name="active" class="form-check-input" value="true"
                                    th:checked="${product.active}">
                                <label class="form-check-label">Hiển thị</label>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Lưu</button>
                            <a th:href="@{/admin/products}" class="btn btn-secondary">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
