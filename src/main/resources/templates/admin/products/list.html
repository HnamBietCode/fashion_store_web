<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Sản phẩm - Admin')}"></head>

<body>
    <div class="d-flex">
        <div style="width:240px;min-width:240px;" th:replace="~{admin/fragments/layout :: sidebar}"></div>

        <div class="main-content flex-grow-1 p-4">
            <div class="topbar">
                <div>
                    <h5 class="mb-0 fw-bold">Quản lý Sản phẩm</h5>
                    <small class="text-muted" th:text="${products.totalElements} + ' sản phẩm'">0 sản phẩm</small>
                </div>
                <a th:href="@{/admin/products/create}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Thêm sản phẩm
                </a>
            </div>

            <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" th:text="${error}"></div>

            <!-- Search bar -->
            <div class="card mb-3 border-0 shadow-sm">
                <div class="card-body py-2">
                    <form th:action="@{/admin/products}" method="get" class="d-flex gap-2">
                        <input type="search" name="q" class="form-control" style="max-width:320px;" th:value="${q}"
                            placeholder="🔍 Tìm theo tên sản phẩm...">
                        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
                        <a th:if="${q != null and !#strings.isEmpty(q)}" th:href="@{/admin/products}"
                            class="btn btn-outline-secondary">Xóa bộ lọc</a>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Hình ảnh</th>
                                <th>Tên sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Giá gốc</th>
                                <th>Giá sale</th>
                                <th>Tồn kho</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${products.isEmpty()}">
                                <td colspan="8" class="text-center py-4 text-muted">Chưa có sản phẩm nào.</td>
                            </tr>
                            <tr th:each="p : ${products}">
                                <td>
                                    <img th:src="${p.imageUrl != null ? p.imageUrl : 'https://placehold.co/60x60?text=No+Img'}"
                                        alt="img" style="width:52px;height:52px;object-fit:cover;border-radius:8px;">
                                </td>
                                <td>
                                    <div class="fw-semibold" th:text="${p.name}">Product</div>
                                    <small class="text-muted"><code th:text="${p.slug}">slug</code></small>
                                </td>
                                <td th:text="${p.category.name}">Category</td>
                                <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                                <td>
                                    <span th:if="${p.salePrice != null}" class="text-danger fw-semibold"
                                        th:text="${#numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                    <span th:unless="${p.salePrice != null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:classappend="${p.stockQuantity < 5} ? 'text-danger fw-bold' : 'text-dark'"
                                        th:text="${p.stockQuantity}">0</span>
                                </td>
                                <td>
                                    <span th:if="${p.active}" class="badge bg-success">Hiển thị</span>
                                    <span th:unless="${p.active}" class="badge bg-secondary">Ẩn</span>
                                    <span th:if="${p.featured}" class="badge bg-warning text-dark ms-1">Nổi bật</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                                        class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post"
                                        class="d-inline"
                                        onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này không?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="card-footer d-flex justify-content-between align-items-center"
                    th:if="${products.totalPages > 1}">
                    <small class="text-muted"
                        th:text="'Trang ' + (${products.number} + 1) + ' / ' + ${products.totalPages}">Trang 1/1</small>
                    <nav>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/products(page=${products.number - 1})}">‹</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                                th:classappend="${i == products.number} ? 'active'">
                                <a class="page-link" th:href="@{/admin/products(page=${i})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/products(page=${products.number + 1})}">›</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
