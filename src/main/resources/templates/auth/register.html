<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng ký - Fashion Store')}"></head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2><i class="bi bi-bag-heart-fill text-primary"></i></h2>
                        <h4>Đăng Ký</h4>
                        <p class="text-muted">Tạo tài khoản mới</p>
                    </div>

                    <!-- Alert messages -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" name="fullName" class="form-control"
                                   placeholder="Nguyễn Văn A" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="your@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" minlength="6" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" name="confirmPassword" class="form-control"
                                   placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-person-plus"></i> Đăng ký
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="mb-0">Đã có tài khoản?
                            <a th:href="@{/login}" class="text-primary">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
            <p class="text-center mt-3">
                <a th:href="@{/}" class="text-muted"><i class="bi bi-arrow-left"></i> Về trang chủ</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
