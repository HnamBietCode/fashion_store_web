<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Yêu thích - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5 bg-light">
        <div class="container">
            <h3 class="fw-bold mb-4"><i class="bi bi-heart-fill text-danger me-2"></i>Sản phẩm yêu thích</h3>

            <!-- Flash msg -->
            <div th:if="${wishlistMsg}" class="alert alert-info alert-dismissible fade show">
                <span th:text="${wishlistMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Empty -->
            <div th:if="${#lists.isEmpty(wishlistItems)}" class="text-center py-5 bg-white rounded-3 shadow-sm">
                <i class="bi bi-heart display-2 text-muted"></i>
                <h5 class="mt-3 text-muted">Chưa có sản phẩm yêu thích nào</h5>
                <a th:href="@{/products}" class="btn btn-primary mt-2">
                    <i class="bi bi-shop me-1"></i>Khám phá sản phẩm
                </a>
            </div>

            <!-- Grid -->
            <div th:unless="${#lists.isEmpty(wishlistItems)}" class="row g-4">
                <div th:each="item : ${wishlistItems}" class="col-md-6 col-lg-3">
                    <div class="card h-100 border-0 shadow-sm" style="border-radius:12px;overflow:hidden;">
                        <div class="position-relative">
                            <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://placehold.co/300x220?text=SP'}"
                                class="card-img-top" style="height:220px;object-fit:cover;"
                                th:alt="${item.product.name}">
                            <!-- Remove from wishlist -->
                            <form th:action="@{/wishlist/toggle/{id}(id=${item.product.id})}" method="post"
                                class="position-absolute top-0 end-0 m-2">
                                <input type="hidden" name="redirect" value="/wishlist">
                                <button type="submit" class="btn btn-sm btn-danger rounded-circle"
                                    title="Xóa khỏi yêu thích" style="width:32px;height:32px;padding:0;">
                                    <i class="bi bi-x"></i>
                                </button>
                            </form>
                            <!-- Sale badge -->
                            <span th:if="${item.product.salePrice != null}"
                                class="position-absolute top-0 start-0 m-2 badge bg-danger">SALE</span>
                        </div>
                        <div class="card-body">
                            <p class="small text-muted mb-1" th:text="${item.product.category.name}">Category</p>
                            <h6 class="fw-semibold mb-2" th:text="${item.product.name}">Tên SP</h6>
                            <div>
                                <span th:if="${item.product.salePrice != null}" class="text-danger fw-bold"
                                    th:text="${#numbers.formatDecimal(item.product.salePrice,0,'COMMA',0,'POINT')}+'đ'">0đ</span>
                                <span th:if="${item.product.salePrice != null}"
                                    class="text-muted text-decoration-line-through small ms-1"
                                    th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')}+'đ'">0đ</span>
                                <span th:if="${item.product.salePrice == null}" class="text-primary fw-bold"
                                    th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')}+'đ'">0đ</span>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 d-flex gap-2 pb-3">
                            <a th:href="@{/products/{slug}(slug=${item.product.slug})}"
                                class="btn btn-outline-primary btn-sm flex-grow-1">Xem</a>
                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" name="productId" th:value="${item.product.id}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
