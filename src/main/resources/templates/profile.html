<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Tài khoản - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <div class="container py-5">
        <div class="row justify-content-center g-4">

            <!-- Sidebar profile -->
            <div class="col-md-3">
                <div class="card text-center p-4">
                    <!-- Avatar initials -->
                    <div class="mx-auto mb-3 rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold"
                        style="width:80px;height:80px;font-size:2rem;"
                        th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">U</div>
                    <h5 class="fw-bold mb-1" th:text="${user.fullName}">User Name</h5>
                    <p class="text-muted small mb-1" th:text="${user.email}">email@example.com</p>
                    <span class="badge" th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-success'"
                        th:text="${user.role.name() == 'ADMIN'} ? 'Admin' : 'Khách hàng'">
                    </span>
                    <hr>
                    <p class="text-muted small mb-0">
                        <i class="bi bi-calendar3 me-1"></i>
                        Tham gia: <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></span>
                    </p>
                </div>

                <!-- Quick links -->
                <div class="list-group mt-3">
                    <a href="#info" class="list-group-item list-group-item-action active">
                        <i class="bi bi-person me-2"></i> Thông tin cá nhân
                    </a>
                    <a href="#password" class="list-group-item list-group-item-action">
                        <i class="bi bi-lock me-2"></i> Đổi mật khẩu
                    </a>
                    <a th:href="@{/orders}" class="list-group-item list-group-item-action">
                        <i class="bi bi-bag me-2"></i> Lịch sử đơn hàng
                    </a>
                </div>
            </div>

            <!-- Main content -->
            <div class="col-md-8">

                <!-- Alert messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- ===== Thông tin cá nhân ===== -->
                <div class="card mb-4" id="info">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-person-circle me-2 text-primary"></i>Thông tin cá nhân
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/profile}" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ và tên <span
                                            class="text-danger">*</span></label>
                                    <input type="text" name="fullName" class="form-control" th:value="${user.fullName}"
                                        required placeholder="Nhập họ và tên">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control bg-light" th:value="${user.email}" disabled
                                        title="Email không thể thay đổi">
                                    <div class="form-text">Email không thể thay đổi.</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="tel" name="phone" class="form-control" th:value="${user.phone}"
                                            placeholder="VD: 0901234567">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Địa chỉ</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                        <input type="text" name="address" class="form-control"
                                            th:value="${user.address}" placeholder="VD: 123 Nguyễn Huệ, Q.1, TP.HCM">
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-check-lg me-1"></i> Lưu thay đổi
                                </button>
                                <a th:href="@{/profile}" class="btn btn-outline-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- ===== Đổi mật khẩu ===== -->
                <div class="card" id="password">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-lock me-2 text-warning"></i>Đổi mật khẩu</h5>
                    </div>
                    <div class="card-body p-4">

                        <!-- Password alerts -->
                        <div th:if="${passwordError}" class="alert alert-danger alert-dismissible fade show">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span th:text="${passwordError}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${passwordSuccess}" class="alert alert-success alert-dismissible fade show">
                            <i class="bi bi-check-circle me-2"></i>
                            <span th:text="${passwordSuccess}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/profile/change-password}" method="post">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Mật khẩu hiện tại <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                                        <input type="password" name="oldPassword" id="oldPassword" class="form-control"
                                            required placeholder="Nhập mật khẩu hiện tại">
                                        <button class="btn btn-outline-secondary" type="button"
                                            onclick="togglePassword('oldPassword')">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Mật khẩu mới <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" name="newPassword" id="newPassword" class="form-control"
                                            required minlength="6" placeholder="Tối thiểu 6 ký tự">
                                        <button class="btn btn-outline-secondary" type="button"
                                            onclick="togglePassword('newPassword')">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Xác nhận mật khẩu <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" name="confirmPassword" id="confirmPassword"
                                            class="form-control" required placeholder="Nhập lại mật khẩu mới"
                                            oninput="checkPasswordMatch()">
                                        <button class="btn btn-outline-secondary" type="button"
                                            onclick="togglePassword('confirmPassword')">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    <div id="matchFeedback" class="form-text"></div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-warning px-4">
                                    <i class="bi bi-shield-lock me-1"></i> Đổi mật khẩu
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle hiện/ẩn mật khẩu
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Kiểm tra mật khẩu xác nhận có khớp không (realtime)
        function checkPasswordMatch() {
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
            const feedback = document.getElementById('matchFeedback');

            if (confirmPw.length === 0) {
                feedback.textContent = '';
                return;
            }
            if (newPw === confirmPw) {
                feedback.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Mật khẩu khớp</span>';
            } else {
                feedback.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Mật khẩu chưa khớp</span>';
            }
        }
    </script>
</body>

</html>
