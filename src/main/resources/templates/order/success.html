<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Đặt hàng thành công - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card text-center">
                        <div class="card-body py-5">
                            <div class="mb-4">
                                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                            </div>
                            <h2 class="text-success">Đặt hàng thành công!</h2>
                            <p class="lead">Cảm ơn bạn đã mua hàng tại Fashion Store</p>

                            <div class="bg-light p-4 rounded my-4">
                                <h5>Mã đơn hàng: <span class="text-primary"
                                        th:text="${order.orderNumber}">FS123456</span></h5>
                                <p class="mb-0">Tổng tiền: <strong class="text-danger"
                                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</strong>
                                </p>
                            </div>

                            <p class="text-muted">
                                Chúng tôi sẽ liên hệ với bạn trong thời gian sớm nhất để xác nhận đơn hàng.
                            </p>

                            <div class="mt-4">
                                <a th:href="@{/orders}" class="btn btn-primary me-2">
                                    <i class="bi bi-bag"></i> Xem đơn hàng
                                </a>
                                <a th:href="@{/products}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
