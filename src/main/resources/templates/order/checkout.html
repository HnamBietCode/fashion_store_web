<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Thanh toán - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5">
        <div class="container">
            <h2 class="mb-4"><i class="bi bi-credit-card"></i> Thanh toán</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/checkout}" method="post">
                <div class="row">
                    <!-- Shipping Info -->
                    <div class="col-lg-7">
                        <div class="card mb-4">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0"><i class="bi bi-truck"></i> Thông tin giao hàng</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">Họ và tên *</label>
                                    <input type="text" name="shippingName" class="form-control"
                                        th:value="${user.fullName}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Số điện thoại *</label>
                                    <input type="tel" name="shippingPhone" class="form-control" th:value="${user.phone}"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Địa chỉ giao hàng *</label>
                                    <textarea name="shippingAddress" class="form-control" rows="3"
                                        th:text="${user.address}" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Ghi chú</label>
                                    <textarea name="note" class="form-control" rows="2"
                                        placeholder="Ghi chú cho đơn hàng..."></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Payment Method -->
                        <div class="card">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0"><i class="bi bi-wallet2"></i> Phương thức thanh toán</h5>
                            </div>
                            <div class="card-body">
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="radio" name="paymentMethod" value="COD"
                                        id="cod" checked>
                                    <label class="form-check-label" for="cod">
                                        <strong>Thanh toán khi nhận hàng (COD)</strong>
                                        <br><small class="text-muted">Thanh toán bằng tiền mặt khi nhận được
                                            hàng</small>
                                    </label>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="radio" name="paymentMethod"
                                        value="BANK_TRANSFER" id="bank">
                                    <label class="form-check-label" for="bank">
                                        <strong>Chuyển khoản ngân hàng</strong>
                                        <br><small class="text-muted">Chuyển khoản trước khi giao hàng</small>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Order Summary -->
                    <div class="col-lg-5">
                        <div class="card sticky-top" style="top: 80px;">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0">Đơn hàng của bạn</h5>
                            </div>
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item" th:each="item : ${cartItems}">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <span th:text="${item.product.name}">Product</span>
                                            <small class="text-muted"> x <span
                                                    th:text="${item.quantity}">1</span></small>
                                        </div>
                                        <span
                                            th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                    </div>
                                </li>
                            </ul>
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Tạm tính:</span>
                                    <span
                                        th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Phí vận chuyển:</span>
                                    <span class="text-success">Miễn phí</span>
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between mb-3">
                                    <strong>Tổng cộng:</strong>
                                    <strong class="text-danger h4"
                                        th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</strong>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 btn-lg">
                                    <i class="bi bi-check-circle"></i> Đặt hàng
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
