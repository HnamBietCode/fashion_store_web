<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Chi tiết đơn hàng - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5">
        <div class="container">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/orders}">Đơn hàng của tôi</a></li>
                    <li class="breadcrumb-item active" th:text="${order.orderNumber}">FS123</li>
                </ol>
            </nav>

            <div class="row">
                <div class="col-lg-8">
                    <!-- Order Items -->
                    <div class="card mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Đơn hàng #<span th:text="${order.orderNumber}">FS123</span></h5>
                            <span class="badge bg-warning" th:text="${order.status}">PENDING</span>
                        </div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item" th:each="item : ${order.items}">
                                <div class="row align-items-center">
                                    <div class="col-md-6">
                                        <h6 class="mb-0" th:text="${item.productName}">Product</h6>
                                        <small class="text-muted" th:if="${item.size != null}">
                                            Size: <span th:text="${item.size}">M</span>
                                        </small>
                                    </div>
                                    <div class="col-md-2"
                                        th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ
                                    </div>
                                    <div class="col-md-2">x <span th:text="${item.quantity}">1</span></div>
                                    <div class="col-md-2 fw-bold text-danger"
                                        th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                        0đ</div>
                                </div>
                            </li>
                        </ul>
                        <div class="card-footer">
                            <div class="d-flex justify-content-between">
                                <strong>Tổng cộng:</strong>
                                <strong class="text-danger h5"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <!-- Shipping Info -->
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h6 class="mb-0">Thông tin giao hàng</h6>
                        </div>
                        <div class="card-body">
                            <p><strong>Người nhận:</strong> <span th:text="${order.shippingName}">Name</span></p>
                            <p><strong>SĐT:</strong> <span th:text="${order.shippingPhone}">Phone</span></p>
                            <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}">Address</span></p>
                            <p><strong>Thanh toán:</strong> <span th:text="${order.paymentMethod}">COD</span></p>
                            <p th:if="${order.note}"><strong>Ghi chú:</strong> <span th:text="${order.note}">Note</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
