<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đơn hàng của tôi - Fashion Store')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5">
        <div class="container">
            <h2 class="mb-4"><i class="bi bi-bag"></i> Đơn hàng của tôi</h2>

            <!-- Empty State -->
            <div th:if="${orders.isEmpty()}" class="card text-center py-5">
                <div class="card-body">
                    <i class="bi bi-bag-x display-1 text-muted"></i>
                    <h4 class="mt-3">Chưa có đơn hàng nào</h4>
                    <a th:href="@{/products}" class="btn btn-primary mt-3">Mua sắm ngay</a>
                </div>
            </div>

            <!-- Orders List -->
            <div th:unless="${orders.isEmpty()}" class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Mã đơn hàng</th>
                                <th>Ngày đặt</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td><strong th:text="${order.orderNumber}">FS123</strong></td>
                                <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                <td class="text-danger fw-bold" 
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning' : 
                                                         (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 
                                                         (${order.status.name() == 'SHIPPING'} ? 'bg-primary' : 
                                                         (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                                          th:text="${order.status.name() == 'PENDING'} ? 'Chờ xác nhận' : 
                                                   (${order.status.name() == 'CONFIRMED'} ? 'Đã xác nhận' : 
                                                   (${order.status.name() == 'SHIPPING'} ? 'Đang giao' : 
                                                   (${order.status.name() == 'DELIVERED'} ? 'Đã giao' : 'Đã hủy')))">Status</span>
                                </td>
                                <td>
                                    <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                        Chi tiết
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
