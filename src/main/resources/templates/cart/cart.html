<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Giỏ hàng - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5">
        <div class="container">
            <h2 class="mb-4"><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>

            <!-- Alert messages -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <!-- Cart Items -->
                <div class="col-lg-8">
                    <!-- Empty Cart -->
                    <div th:if="${cartItems.isEmpty()}" class="card text-center py-5">
                        <div class="card-body">
                            <i class="bi bi-cart-x display-1 text-muted"></i>
                            <h4 class="mt-3">Giỏ hàng trống</h4>
                            <p class="text-muted">Hãy thêm sản phẩm vào giỏ hàng!</p>
                            <a th:href="@{/products}" class="btn btn-primary">
                                <i class="bi bi-bag"></i> Tiếp tục mua sắm
                            </a>
                        </div>
                    </div>

                    <!-- Cart Items List -->
                    <div th:unless="${cartItems.isEmpty()}" class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span th:text="${cartItems.size()} + ' sản phẩm'">0 sản phẩm</span>
                            <form th:action="@{/cart/clear}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Xóa tất cả sản phẩm?')">
                                    <i class="bi bi-trash"></i> Xóa tất cả
                                </button>
                            </form>
                        </div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item" th:each="item : ${cartItems}">
                                <div class="row align-items-center">
                                    <!-- Product Image -->
                                    <div class="col-md-2">
                                        <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : '/images/placeholder.jpg'}"
                                            class="img-fluid rounded" style="max-height: 80px; object-fit: cover;">
                                    </div>
                                    <!-- Product Info -->
                                    <div class="col-md-4">
                                        <h6 class="mb-1">
                                            <a th:href="@{/products/{slug}(slug=${item.product.slug})}"
                                                class="text-decoration-none" th:text="${item.product.name}">Product</a>
                                        </h6>
                                        <small class="text-muted" th:if="${item.variant != null}"
                                            th:text="'Size: ' + ${item.variant.size} + ' | Màu: ' + ${item.variant.color}">Variant</small>
                                    </div>
                                    <!-- Price -->
                                    <div class="col-md-2 text-primary fw-bold"
                                        th:text="${#numbers.formatDecimal(item.product.salePrice != null ? item.product.salePrice : item.product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                        0đ</div>
                                    <!-- Quantity -->
                                    <div class="col-md-2">
                                        <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post"
                                            class="d-flex">
                                            <input type="number" name="quantity"
                                                class="form-control form-control-sm text-center"
                                                th:value="${item.quantity}" min="1" max="99" style="width: 60px;"
                                                onchange="this.form.submit()">
                                        </form>
                                    </div>
                                    <!-- Subtotal -->
                                    <div class="col-md-1 fw-bold text-danger"
                                        th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                        0đ</div>
                                    <!-- Remove -->
                                    <div class="col-md-1 text-end">
                                        <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post"
                                            class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="bi bi-x-lg"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4" th:unless="${cartItems.isEmpty()}">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">Tóm tắt đơn hàng</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span>Tạm tính:</span>
                                <span
                                    th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Phí vận chuyển:</span>
                                <span class="text-success">Miễn phí</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between mb-3">
                                <strong>Tổng cộng:</strong>
                                <strong class="text-danger h5"
                                    th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</strong>
                            </div>
                            <a th:href="@{/checkout}" class="btn btn-primary w-100 btn-lg">
                                <i class="bi bi-credit-card"></i> Tiến hành thanh toán
                            </a>
                            <a th:href="@{/products}" class="btn btn-outline-secondary w-100 mt-2">
                                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
