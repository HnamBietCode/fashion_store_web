<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Đơn hàng của tôi - Fashion Store')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="py-5 bg-light">
        <div class="container">
            <h3 class="fw-bold mb-4"><i class="bi bi-bag me-2"></i>Đơn hàng của tôi</h3>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 bg-white rounded-3 shadow-sm">
                <i class="bi bi-bag-x display-2 text-muted"></i>
                <h5 class="mt-3 text-muted">Bạn chưa có đơn hàng nào</h5>
                <a th:href="@{/products}" class="btn btn-primary mt-2">
                    <i class="bi bi-shop me-1"></i>Mua sắm ngay
                </a>
            </div>

            <!-- Orders list -->
            <div th:unless="${#lists.isEmpty(orders)}" class="d-flex flex-column gap-3">
                <div th:each="order : ${orders}" class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                            <div>
                                <h6 class="mb-0 fw-bold">Đơn hàng #<span th:text="${order.orderNumber}">FS123</span>
                                </h6>
                                <small class="text-muted"
                                    th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</small>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <!-- Status badge -->
                                <span class="badge fs-6" th:classappend="${order.status.name() == 'PENDING'}   ? 'bg-warning text-dark' :
                                              (${order.status.name() == 'CONFIRMED'} ? 'bg-info'     :
                                              (${order.status.name() == 'SHIPPING'}  ? 'bg-primary'  :
                                              (${order.status.name() == 'DELIVERED'} ? 'bg-success'  : 'bg-danger')))"
                                    th:text="${order.status.name() == 'PENDING'}   ? '⏳ Chờ xác nhận' :
                                        (${order.status.name() == 'CONFIRMED'} ? '✅ Đã xác nhận' :
                                        (${order.status.name() == 'SHIPPING'}  ? '🚚 Đang giao'   :
                                        (${order.status.name() == 'DELIVERED'} ? '🏠 Đã giao'     : '❌ Đã hủy')))">
                                </span>
                                <!-- Unpaid Badge -->
                                <span th:if="${order.status.name() == 'PENDING'}" class="badge bg-danger fs-6 ms-2">Chưa
                                    thanh toán</span>
                            </div>
                        </div>

                        <!-- Items preview -->
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <div th:each="item : ${order.items}"
                                class="d-flex align-items-center gap-2 border rounded-2 p-2 bg-light small">
                                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://placehold.co/40x40?text=SP'}"
                                    style="width:40px;height:40px;object-fit:cover;border-radius:6px;">
                                <div>
                                    <div class="fw-semibold" th:text="${item.productName}">Tên SP</div>
                                    <div class="text-muted" th:if="${item.size != null}"
                                        th:text="${item.size} + ' / ' + ${item.color}">Size</div>
                                </div>
                                <span class="badge bg-secondary ms-1" th:text="'x' + ${item.quantity}">x1</span>
                            </div>
                        </div>

                        <!-- Footer: total + link -->
                        <div class="d-flex justify-content-between align-items-center border-top pt-3">
                            <div>
                                <span class="text-muted small">Tổng tiền: </span>
                                <span class="fw-bold text-danger"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                            </div>
                            <div class="d-flex gap-2">
                                <a th:if="${order.status.name() == 'PENDING'}"
                                    th:href="@{/paypal-checkout(orderNumber=${order.orderNumber})}"
                                    class="btn btn-sm btn-warning fw-semibold">
                                    <i class="bi bi-paypal me-1"></i>Thanh toán Paypal
                                </a>
                                <a th:href="@{/orders/{num}(num=${order.orderNumber})}"
                                    class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye me-1"></i>Xem chi tiết
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
